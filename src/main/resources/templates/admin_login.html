<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion Administration - WatchLux</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Outfit', sans-serif; background: #0a0a0a; color: #f1f1f1; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 1rem; }

        .login-card {
            background: #111; border: 1px solid #1e1e1e; border-radius: 12px;
            padding: 2.5rem; width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
        }
        .logo { font-size: 1.8rem; font-weight: 700; color: #d4af37; letter-spacing: 3px; text-decoration: none; display: block; margin-bottom: 0.5rem; }
        .logo span { color: #fff; }
        .title { font-size: 1.1rem; color: #888; margin-bottom: 2rem; }

        .form-group { margin-bottom: 1.5rem; text-align: left; }
        label { display: block; font-size: 0.85rem; color: #aaa; margin-bottom: 0.5rem; font-weight: 600; }
        input {
            width: 100%; padding: 0.8rem; background: #181818; border: 1px solid #2e2e2e;
            border-radius: 6px; color: #fff; font-family: 'Outfit', sans-serif; font-size: 0.95rem;
            transition: all 0.2s;
        }
        input:focus { border-color: #d4af37; outline: none; }

        .error-msg { background: rgba(168, 50, 50, 0.1); color: #ff6b6b; font-size: 0.85rem; padding: 0.6rem; border-radius: 4px; border: 1px solid rgba(168, 50, 50, 0.2); margin-bottom: 1.5rem; text-align: center; }

        .btn-submit {
            width: 100%; padding: 0.9rem; background: #d4af37; color: #000; border: none;
            border-radius: 6px; font-weight: 700; font-size: 1rem; cursor: pointer;
            transition: all 0.2s; font-family: 'Outfit', sans-serif; margin-top: 0.5rem;
        }
        .btn-submit:hover { background: #c49e2d; transform: translateY(-2px); }

        .back-link { display: inline-block; margin-top: 1.5rem; color: #666; text-decoration: none; font-size: 0.88rem; transition: color 0.2s; }
        .back-link:hover { color: #d4af37; }
    </style>
</head>
<body>

<div class="login-card">
    <a href="/" class="logo">Watch<span>Lux</span></a>
    <p class="title">Espace Administration</p>

    <!-- Message d'erreur -->
    <div class="error-msg" th:if="${error != null}" th:text="${error}"></div>

    <form action="/admin/login" method="POST">
        <div class="form-group">
            <label for="email">E-mail d'administrateur</label>
            <input type="email" id="email" name="email" required autofocus>
        </div>

        <div class="form-group">
            <label for="password">Mot de passe</label>
            <input type="password" id="password" name="password" placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn-submit">Se connecter</button>
    </form>

    <a href="/" class="back-link">← Retour au site client</a>
</div>

</body>
</html>
