<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finaliser ma commande - WatchLux</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Outfit', sans-serif; background: #0a0a0a; color: #f1f1f1; }

        nav {
            background: rgba(10,10,10,0.95); border-bottom: 1px solid #222;
            padding: 1rem 3rem; display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 100;
        }
        .logo { font-size: 1.6rem; font-weight: 700; color: #d4af37; letter-spacing: 2px; text-decoration: none; }
        .logo span { color: #fff; }
        .nav-links { display: flex; gap: 2rem; align-items: center; }
        .nav-links a { color: #ccc; text-decoration: none; font-size: 0.95rem; transition: color 0.2s; }
        .nav-links a:hover { color: #d4af37; }
        .nav-cart {
            background: #d4af37; color: #000 !important; font-weight: 700;
            padding: 0.5rem 1.2rem; border-radius: 6px; text-decoration: none; font-size: 0.9rem;
        }

        .page-header {
            background: linear-gradient(135deg, #111 0%, #1a1208 100%);
            padding: 3rem; border-bottom: 1px solid #1e1e1e;
        }
        .page-header h1 { font-size: 2rem; font-weight: 700; }
        .page-header h1 span { color: #d4af37; }
        .page-header p { color: #666; margin-top: 0.4rem; }

        .content { max-width: 1000px; margin: 0 auto; padding: 2.5rem 3rem; }
        .checkout-layout { display: grid; grid-template-columns: 1fr 340px; gap: 2rem; align-items: flex-start; }

        /* FORM CARD */
        .form-card {
            background: #111; border: 1px solid #1e1e1e; border-radius: 12px; padding: 2rem;
        }
        .form-card h2 { font-size: 1.15rem; font-weight: 700; margin-bottom: 1.5rem; color: #f1f1f1; border-bottom: 1px solid #1e1e1e; padding-bottom: 0.75rem; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .form-group { margin-bottom: 1.25rem; }
        label { display: block; font-size: 0.85rem; color: #888; margin-bottom: 0.4rem; font-weight: 500; }
        input[type="text"], input[type="email"], textarea {
            width: 100%; background: #0e0e0e; border: 1px solid #222; color: #f1f1f1;
            padding: 0.75rem 1rem; border-radius: 8px; font-family: 'Outfit', sans-serif;
            font-size: 0.95rem; transition: border-color 0.2s;
        }
        input:focus, textarea:focus { outline: none; border-color: #d4af37; }
        textarea { resize: vertical; min-height: 110px; }
        input[disabled] { background: #0a0a0a; color: #555; cursor: not-allowed; border-color: #161616; }

        .btn-submit {
            width: 100%; background: #d4af37; color: #000; border: none; cursor: pointer;
            padding: 0.9rem; border-radius: 8px; font-size: 1rem; font-weight: 700;
            font-family: 'Outfit', sans-serif; transition: background 0.2s; margin-top: 0.5rem;
        }
        .btn-submit:hover { background: #c49e2d; }

        /* SUMMARY CARD */
        .summary-card {
            background: #111; border: 1px solid #1e1e1e; border-radius: 12px;
            padding: 1.75rem; position: sticky; top: 100px;
        }
        .summary-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 1.5rem; border-bottom: 1px solid #1e1e1e; padding-bottom: 0.75rem; }
        .summary-item { display: flex; justify-content: space-between; margin-bottom: 0.8rem; font-size: 0.9rem; color: #999; }
        .summary-item-name { color: #ccc; font-weight: 600; }
        .summary-divider { border: none; border-top: 1px solid #1e1e1e; margin: 1rem 0; }
        .summary-total { display: flex; justify-content: space-between; font-size: 1.2rem; font-weight: 700; color: #d4af37; margin-top: 0.5rem; }

        footer { border-top: 1px solid #1a1a1a; text-align: center; padding: 2rem; color: #555; font-size: 0.85rem; }
        footer span { color: #d4af37; }
    </style>
</head>
<body>

<!-- NAVBAR -->
<nav>
    <a href="/" class="logo">Watch<span>Lux</span></a>
    <div class="nav-links">
        <a href="/">Accueil</a>
        <a href="/produits">Boutique</a>
        <a href="/panier" class="nav-cart">🛒 Panier</a>
    </div>
</nav>

<!-- PAGE HEADER -->
<div class="page-header">
    <h1>Finaliser ma <span>Commande</span></h1>
    <p>Vérifiez vos informations et indiquez votre adresse de livraison.</p>
</div>

<div class="content">
    <div class="checkout-layout">

        <!-- FORMULAIRE -->
        <div class="form-card">
            <h2>Informations de livraison</h2>
            <form th:action="@{/commander}" method="post">

                <div class="form-row">
                    <div class="form-group">
                        <label>Prénom</label>
                        <input type="text" th:value="${session.currentUser.prenom}" disabled>
                    </div>
                    <div class="form-group">
                        <label>Nom</label>
                        <input type="text" th:value="${session.currentUser.nom}" disabled>
                    </div>
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" th:value="${session.currentUser.email}" disabled>
                </div>

                <div class="form-group">
                    <label for="adresse">Adresse de livraison *</label>
                    <textarea name="adresse" id="adresse" placeholder="Numéro, rue, ville, wilaya..." required></textarea>
                </div>

                <button type="submit" class="btn-submit">Confirmer et commander →</button>
            </form>
        </div>

        <!-- RÉSUMÉ -->
        <div class="summary-card">
            <div class="summary-title">Récapitulatif</div>

            <div th:each="lp : ${panier.lignePaniers}">
                <div class="summary-item">
                    <span class="summary-item-name" th:text="${lp.produits.nom}">Montre</span>
                    <span th:text="${lp.produits.prix * lp.quantite} + ' DH'">Prix</span>
                </div>
                <div class="summary-item" style="font-size:0.8rem; color:#444; margin-top:-0.5rem; margin-bottom: 0.8rem;">
                    <span>Qté : <span th:text="${lp.quantite}">1</span></span>
                    <span th:text="${lp.produits.prix} + ' DH / unité'">Prix</span>
                </div>
            </div>

            <hr class="summary-divider">

            <div class="summary-item">
                <span>Livraison</span>
                <span style="color:#10b981; font-weight:600;">Gratuite</span>
            </div>
            <div class="summary-total">
                <span>Total</span>
                <span th:text="${total} + ' DH'">0 DH</span>
            </div>
        </div>

    </div>
</div>

<footer>
    <p>© 2025 <span>WatchLux</span> — Tous droits réservés.</p>
</footer>

</body>
</html>
